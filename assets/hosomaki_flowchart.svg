<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, monospace;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A flowchart of collect, sanitise, prompt, validate, repair, render in Hosomaki's cream and ink palette. Each stage has a small icon and properly fitted text. Prompt and repair are highlighted in salmon as the two steps that call Ollama. Prompt connects down into validate, which loops to repair and back up to three times via clean right-angle paths that meet box edges exactly, before falling through to render.</desc>
