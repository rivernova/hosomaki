<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110" width="140" height="110" role="img">
  <title>Hosomaki</title>
  <desc>Hosomaki logo — two sushi rolls above wordmark</desc>

  <style>
    .wordmark {
      font-family: monospace;
      font-weight: 500;
      font-size: 14px;
      fill: #1a1a1a;
      letter-spacing: 3px;
    }
  </style>

  <!-- Mark centered horizontally at x=70, y=48 -->
  <g transform="translate(70, 48)">

    <!-- Shadow -->
    <ellipse cx="2" cy="34" rx="54" ry="5" fill="#1a1a1a" opacity="0.06"/>

    <!-- Right roll (behind) -->
    <g transform="translate(26, 6)">
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#a8c9b4"/>
      <rect x="-19" y="-19" width="38" height="38" rx="9" fill="none" stroke="#96b8a3" stroke-width="1"/>
      <rect x="-17" y="-17" width="34" height="34" rx="7" fill="#f7f0e6"/>
      <circle cx="-9"  cy="-9"  r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="0"   cy="-11" r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="9"   cy="-9"  r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="-11" cy="0"   r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="11"  cy="0"   r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="-9"  cy="9"   r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="0"   cy="11"  r="1.4" fill="#ede4d4" opacity="0.8"/>
      <circle cx="9"   cy="9"   r="1.4" fill="#ede4d4" opacity="0.8"/>
      <rect x="-9" y="-9" width="18" height="18" rx="4" fill="#edc8bc"/>
      <rect x="-4" y="-4" width="8"  height="8"  rx="2" fill="#d4957a"/>
    </g>

    <!-- Left roll (front) -->
    <g transform="translate(-26, -6)">
      <rect x="-24" y="-24" width="48" height="48" rx="12" fill="#bcd9c8"/>
      <rect x="-19" y="-19" width="38" height="38" rx="9" fill="none" stroke="#aacbb8" stroke-width="1"/>
      <rect x="-17" y="-17" width="34" height="34" rx="7" fill="#faf4ec"/>
      <circle cx="-9"  cy="-9"  r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="0"   cy="-11" r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="9"   cy="-9"  r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="-11" cy="0"   r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="11"  cy="0"   r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="-9"  cy="9"   r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="0"   cy="11"  r="1.4" fill="#ede4d4" opacity="0.9"/>
      <circle cx="9"   cy="9"   r="1.4" fill="#ede4d4" opacity="0.9"/>
      <rect x="-9" y="-9" width="18" height="18" rx="4" fill="#f2d0c6"/>
      <rect x="-6" y="-6" width="12" height="12" rx="3" fill="#eabfb2"/>
      <rect x="-4" y="-4" width="8"  height="8"  rx="2" fill="#d4957a"/>
      <rect x="-3" y="-3" width="4"  height="4"  rx="1" fill="#dda88e" opacity="0.7"/>
    </g>

  </g>

  <!-- Wordmark centered below mark -->
  <text x="70" y="100" class="wordmark" text-anchor="middle">hosomaki</text>

</svg>
