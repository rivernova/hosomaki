name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  package:
    name: Build packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Run tests
        run: go test ./... -race

      - name: Build packages
        run: make package

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        working-directory: dist
        run: cosign sign-blob --bundle checksums.txt.sigstore.json checksums.txt --yes

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*

      - name: Attach packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            📖 Docs: https://rivernova.github.io/hosomaki/

            🔏 Artifacts are checksummed and signed with [cosign](https://docs.sigstore.dev/cosign/overview/) (keyless, via this workflow's GitHub Actions identity). Verify with:
            ```
            cosign verify-blob \
              --certificate-identity "https://github.com/rivernova/hosomaki/.github/workflows/release.yml@${{ github.ref }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --bundle checksums.txt.sigstore.json \
              checksums.txt
            sha256sum --ignore-missing -c checksums.txt
            ```