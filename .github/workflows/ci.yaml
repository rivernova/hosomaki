name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./... -race -coverpkg=./... -coverprofile=coverage.txt

      - name: Coverage report
        run: go tool cover -func=coverage.txt | tail -1

      - name: Core coverage gate
        run: |
          head -1 coverage.txt > core.cov
          grep -E 'hosomaki/internal/(collector|ai|sanitiser|prompt)/' coverage.txt >> core.cov
          core=$(go tool cover -func=core.cov | awk '/^total:/ {print substr($NF, 1, length($NF)-1)}')
          echo "core coverage: ${core}% (floor 70%)"
          awk -v c="$core" 'BEGIN { exit (c+0 < 70) ? 1 : 0 }' \
            || { echo "::error::core coverage ${core}% is below the 70% floor"; exit 1; }

      - name: Build
        run: go build ./...