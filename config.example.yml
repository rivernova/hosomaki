# Hosomaki configuration
# Copy this file to ~/.config/hosomaki/config.yaml and edit as needed.

ai:
  provider: ollama                   # only supported provider currently
  endpoint: http://localhost:11434   # default
  model: llama3.1:8b                 # any model
  timeout: 120s                      # increase for slow hardware or large models
  temperature: 0.1
  num_predict: 2048

output:
  color: true
  language: en                       # (en, es, fr, de, …)